IMPORT:
  - ../ODD_Taxonomy_Extended.yaml

ODD:
  lsa_main_module:
    TITLE: ODD for Vision Pilot
    DESCRIPTION: This module defines the ODD for the LSA.
    INCLUDE_AND:
      modeul_l3_waypoint_pursuing: true
      module_l3_emergency_braking: true
      module_l3_object_avoidance: true
      module_l3_intersection: true

MODULES:
  module_l3_waypoint_pusing:
    TITLE: ODD of the L3 waypoint pursuing behavior
    INCLUDE_AND:
      horizontal_plane:
        - straight_lines
        - curves
        - u_turn
      curvature: "[xx .. yy] 1/m"
      transverse_plane_type:
        - divided
        - undivided
        - pavements
      bank_angle: "[xx .. yy] deg"
      superelevation_banking:
        - any_superelevation_banking # newly added to avoid empty categoricals
      longitudinal_plane:
        - up-slope # positive gradient
        - down-slope # negative-gradient
        - level_plane
      inclination_angle: "[xx .. yy] deg"
      drivable_area_surface_type:
        - asphalt
        - cement_concrete
      damages:
        - cracks
        - potholes
        - ruts
        - swells
    EXCLUDE_OR:
      bad_weather: false
      bad_visibility: false
    
  module_l3_emergency_braking:
    TITLE: ODD of the L3 Emergency Braking behavior
    INCLUDE_AND:
      horizontal_plane:
        - straight_lines
        - curves
      superelevation_banking:
        - any_superelevation_banking # newly added to avoid empty categoricals
      longitudinal_plane:
        - up-slope # positive gradient
        - down-slope # negative-gradient
        - level_plane
    EXCLUDE_OR:
      bad_weather: false
      bad_visibility: false

  module_l3_object_avoidance:
    TITLE: ODD of the L3 object avoidance
    INCLUDE_AND:
      horizontal_plane:
        - straight_lines
        - curves
      superelevation_banking:
        - any_superelevation_banking # newly added to avoid empty categoricals
      longitudinal_plane:
        - up-slope # positive gradient
        - down-slope # negative-gradient
        - level_plane
    EXCLUDE_OR:
      bad_weather: false
      bad_visibility: false

  module_l3_intersection:
    TITLE: ODD of the L3 Emergency Braking behavior
    INCLUDE_AND:
      horizontal_plane:
        - straight_lines
        - curves
      superelevation_banking:
        - any_superelevation_banking # newly added to avoid empty categoricals
      longitudinal_plane:
        - up-slope # positive gradient
        - down-slope # negative-gradient
        - level_plane
    EXCLUDE_OR:
      bad_weather: false
      bad_visibility: false
      
  module_low_lighting:
    LABEL: bad_visibility
    INCLUDE_OR:
      illuminance: "<= x lux"
